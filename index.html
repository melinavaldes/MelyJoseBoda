<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melina & José</title>

<style>

body{
margin:0;
background:#f3eee7;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* CONTENEDOR SOBRE */

#sobre{
position:relative;
width:420px;
cursor:pointer;
}

/* IMAGEN SOBRE */

#sobre img{
width:100%;
display:block;
border-radius:4px;
}

/* SELLO CLICKEABLE */

#sello{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
}

/* SOLAPAS ANIMADAS */

.solapa{
position:absolute;
width:100%;
height:50%;
background:#e9e3db;
left:0;
transition:1s;
}

.arriba{
top:0;
transform-origin:top;
}

.abajo{
bottom:0;
transform-origin:bottom;
}

/* CUANDO SE ABRE */

.abrir .arriba{
transform:rotateX(180deg);
}

.abrir .abajo{
transform:rotateX(-180deg);
}

/* PÁGINA FINAL */

#pagina{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
}

</style>

</head>

<body>

<div id="sobre">

<img src="sobre.jpg">

<div id="sello" onclick="abrirSobre()"></div>

<div class="solapa arriba"></div>
<div class="solapa abajo"></div>

</div>

<div id="pagina"></div>

<script>

function abrirSobre(){

const sobre = document.getElementById("sobre")

sobre.classList.add("abrir")

setTimeout(()=>{
sobre.style.display="none"
document.getElementById("pagina").style.display="block"
},1000)

}

</script>

</body>
</html>
