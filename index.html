<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melina & José</title>

<style>

body{
margin:0;
font-family:Georgia, serif;
background-color:#f3eee7;
background-image:url("paper.png");
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

/* pantalla sobre */

#sobre{
cursor:pointer;
}

.sello{
width:130px;
height:130px;
background:#dba5a5;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:34px;
color:white;
font-family:serif;
box-shadow:
0 10px 20px rgba(0,0,0,0.15),
inset 0 2px 6px rgba(255,255,255,0.3);
}

.texto{
margin-top:20px;
font-size:20px;
color:#666;
}

/* invitacion */

#invitacion{
display:none;
background:white;
padding:40px;
border-radius:10px;
max-width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
font-weight:normal;
}

button{
margin-top:20px;
padding:14px 26px;
background:#c4a484;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="sobre" onclick="abrirInvitacion()">

<div class="sello">
M & J
</div>

<div class="texto">
Esta invitación es exclusiva para ti
</div>

</div>

<div id="invitacion">

<h1>Melina & José</h1>

<p>Nos encantaría que nos acompañaras<br>en nuestra boda</p>

<p>
31 Octubre 2026
</p>

<p>
Skeabost House Hotel<br>
Isle of Skye
</p>

<button onclick="rsvp()">
Confirmar asistencia
</button>

</div>

<script>

function abrirInvitacion(){
document.getElementById("sobre").style.display="none";
document.getElementById("invitacion").style.display="block";
}

function rsvp(){
window.location.href="https://forms.gle/";
}

</script>

</body>
</html>
