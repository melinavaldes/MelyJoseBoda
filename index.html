<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melina & José</title>

<style>

body{
margin:0;
background:#f3eee7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Georgia, serif;
}

/* CONTENEDOR */

#contenedor{
position:relative;
width:420px;
height:640px;
}

/* SOBRE */

#sobre{
position:absolute;
width:100%;
height:100%;
background-image:url("sobre.jpg");
background-size:cover;
background-position:center;
}

/* SOLAPA SUPERIOR */

#solapa{
position:absolute;
top:0;
width:100%;
height:50%;
background-image:url("sobre.jpg");
background-size:cover;
background-position:top;
transform-origin:top;
transition:transform 1s ease;
clip-path:polygon(0 0,100% 0,50% 100%);
}

/* SELLO CLICKEABLE */

#sello{
position:absolute;
top:38%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
cursor:pointer;
transition:0.4s;
}

/* INVITACION */

#invitacion{
position:absolute;
bottom:-420px;
left:5%;
width:90%;
height:420px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:1.2s;
}

h1{
font-weight:normal;
margin-bottom:10px;
}

p{
color:#555;
margin:6px 0;
}

/* ANIMACION */

.abrir #solapa{
transform:rotateX(180deg);
}

.abrir #invitacion{
bottom:80px;
}

</style>

</head>

<body>

<div id="contenedor">

<div id="sobre"></div>

<div id="solapa"></div>

<div id="sello" onclick="abrirSobre()"></div>

<div id="invitacion">

<h1>Melina & José</h1>

<p>Nos encantaría que nos acompañaras</p>

<p>31 Octubre 2026</p>

<p>Skeabost House Hotel<br>Isle of Skye</p>

</div>

</div>

<script>

function abrirSobre(){

document.getElementById("sello").style.opacity="0"

document.getElementById("contenedor").classList.add("abrir")

}

</script>

</body>
</html>
