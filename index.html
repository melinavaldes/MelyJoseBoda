<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Melina & Jose</title>

<style>

body{
margin:0;
background:#f3eee7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:serif;
}

/* CONTENEDOR */

#contenedor{
position:relative;
width:420px;
}

/* SOBRE */

#sobre img{
width:100%;
display:block;
}

/* SELLO CLICKEABLE */

#sello{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:140px;
height:140px;
cursor:pointer;
}

/* INVITACION */

#invitacion{
position:absolute;
bottom:-100%;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:1.2s;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* CUANDO SE ABRE */

.abrir #invitacion{
bottom:0;
}

h1{
font-weight:normal;
font-size:34px;
margin-bottom:10px;
}

p{
color:#555;
}

</style>

</head>

<body>

<div id="contenedor">

<div id="sobre">

<img src="sobre.jpg">

<div id="sello" onclick="abrirSobre()"></div>

</div>

<div id="invitacion">

<h1>Melina & José</h1>

<p>Nos encantaría que nos acompañaras</p>

<p>31 Octubre 2026</p>

<p>Skeabost House Hotel<br>Isle of Skye</p>

</div>

</div>

<script>

function abrirSobre(){

document.getElementById("contenedor").classList.add("abrir")

}

</script>

</body>
</html>
